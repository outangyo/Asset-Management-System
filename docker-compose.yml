services:
  # SQL Server Database
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: assetmanagement-db
    user: root
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: PasswordTest123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P PasswordTest123 -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Run EF Core Migrations
  migrations:
    build:
      context: .
      dockerfile: AssetManagementSystem.Web/Dockerfile
      target: publish
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=AssetManagementDB;User Id=sa;Password=PasswordTest123;TrustServerCertificate=True;
    entrypoint: /bin/bash
    command: ["-c", "/root/.dotnet/tools/dotnet-ef database update --project ../AssetManagementSystem.Db/AssetManagementSystem.Db.csproj && echo 'Migrations complete!'"]

  # Web Application
  web:
    build:
      context: .
      dockerfile: AssetManagementSystem.Web/Dockerfile
    container_name: assetmanagement-web
    ports:
      - "8080:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=db;Database=AssetManagementDB;User Id=sa;Password=PasswordTest123;TrustServerCertificate=True;
      # --- SECRETS ADDED HERE ---
      - EmailSettings__Password=amlbiktzijzeznxe
      - Authentication__Google__ClientId=YOUR_GOOGLE_CLIENT_ID
      - Authentication__Google__ClientSecret=YOUR_GOOGLE_CLIENT_SECRET
      - Authentication__Facebook__ClientId=YOUR_FACEBOOK_CLIENT_ID
      - Authentication__Facebook__ClientSecret=YOUR_FACEBOOK_CLIENT_SECRET
    depends_on:
      migrations:
        condition: service_completed_successfully

volumes:
  sqlserver_data: